name: Release template

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and push template
        run: |
          repo=https://x-access-token:${{ secrets.TEMPLATE_PAT }}@github.com/meowapps/meowapps-template.git
          git clone "$repo" meowapps-template
          cd meowapps-template
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean tracked files (keep .git, node_modules)
          git ls-files -z | xargs -0 rm -f
          cd ..

          cp .firebaserc .gitignore shopify.app.toml meowapps-template/
          mkdir -p meowapps-template/src
          cp src/page.index.jsx src/app.index.jsx src/app.additional.jsx src/app._layout.jsx meowapps-template/src/

          cat > meowapps-template/package.json << 'PKG'
          {
            "private": true,
            "scripts": {
              "dev": "meowapps dev",
              "deploy": "meowapps deploy",
              "upgrade": "node -e \"fs=require('fs');['node_modules','package-lock.json','dist'].forEach(p=>fs.rmSync(p,{recursive:true,force:true}))\" && npm i"
            },
            "dependencies": {
              "meowapps": "github:meowapps/meowapps",
              "react": "^19.2.4"
            }
          }
          PKG

          cd meowapps-template
          npm install

          git add -A
          git diff --cached --quiet || git commit -m "${{ github.event.head_commit.message }} (meowapps/meowapps@${{ github.sha }})" && git push
