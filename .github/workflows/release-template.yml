name: Release template

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and push template
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          repo=https://x-access-token:${{ secrets.TEMPLATE_PAT }}@github.com/meowapps/meowapps-template.git
          git clone "$repo" meowapps-template
          cd meowapps-template
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean tracked files (keep .git, node_modules)
          git ls-files -z | xargs -0 rm -f
          cd ..

          cp .firebaserc .gitignore shopify.app.toml shopify.web.toml meowapps-template/
          mkdir -p meowapps-template/src
          cp src/page.index.jsx src/app.index.jsx src/app.additional.jsx src/app._layout.jsx meowapps-template/src/

          cat > meowapps-template/package.json << 'PKG'
          {
            "private": true,
            "scripts": {
              "dev": "shopify app dev",
              "deploy": "shopify app deploy && meowapps deploy",
              "claude": "meowapps claude",
              "upgrade": "meowapps upgrade"
            },
            "dependencies": {
              "meowapps": "github:meowapps/meowapps",
              "react": "^19.2.4"
            }
          }
          PKG

          cd meowapps-template
          npm install

          git add -A
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          git diff --cached --quiet || git commit -m "$FIRST_LINE (meowapps/meowapps@$COMMIT_SHA)" && git push
